name: trackr

services:
  api:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: trackr-api
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Data Source=/data/trackr.db
      Cors__AllowedOrigins__0: http://localhost:5081
      Cors__AllowedOrigins__1: http://localhost:5247
      Cors__AllowedOrigins__2: https://localhost:7205
    volumes:
      - ./src/backend:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        API_BASE_URL: http://localhost:5080
    container_name: trackr-web
    ports:
      - "5081:8080"
    depends_on:
      api:
        condition: service_healthy