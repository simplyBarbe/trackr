<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trackr</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preload" href="logo_black.png" as="image" />
    <link rel="preload" href="logo_color.png" as="image" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="frontend.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="trackr-splash" class="trackr-splash">
        <div class="trackr-load-stack">
            <div class="trackr-load-logo" aria-hidden="true">
                <img class="trackr-load-logo__base" src="logo_black.png" alt="" />
                <img class="trackr-load-logo__color" src="logo_color.png" alt="" />
            </div>
            <p class="trackr-load-label" id="trackr-load-label" aria-live="polite">0%</p>
        </div>
    </div>

    <div id="app"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss" aria-label="Dismiss">X</span>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="js/trackr-splash.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script>
        window.downloadFile = (fileName, content) => {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', fileName);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        };
    </script>
</body>

</html>
